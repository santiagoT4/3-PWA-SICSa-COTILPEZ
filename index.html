  <meta name="theme-color" content="#0f766e">
  <title>Cotilpez POS - Kyte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }

    button:active { transform: scale(0.97); transition: transform 0.05s; }

      z-index: 1000;

      overflow-y: auto;

      border: 2px solid #f3f3f3;

      border-radius: 50%;

      height: 16px;

      display: inline-block;

    }

      0% { transform: rotate(0deg); }

    }
    .bluetooth-connected {
      background: #10b981;

    }
  </style>
</head>
<body class="bg-gray-100">

<div id="app" class="min-h-screen"></div>

<script>
  // ============ CONFIGURACIÓN ============
  const API_URL = 'https://script.google.com/macros/s/AKfycbxY_j1xt15EyFPIefSQ1XVNQ0k6L2cZMwgcETq2VgR0M8foSalcGnSnpcMOyRNqPu1aAg/exec';

  // ============ CAPA DE COMUNICACIÓN API MEJORADA ============
  const API = {
    async call(accion, payload = null) {
      try {
        const body = { accion };
        if (payload) body.payload = payload;
        
        const respuesta = await fetch(API_URL, {
          method: 'POST',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(body)
        });
        
        if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);
        
        const texto = await respuesta.text();
        if (!texto || texto.trim() === '') {
          return { success: false, error: 'Respuesta vacía del servidor' };
        }
        
        const data = JSON.parse(texto);
        // ✅ Garantizar siempre estructura consistente
        if (typeof data !== 'object' || data === null) {
          return { success: false, error: 'Formato inválido' };
        }
        return data;
      } catch (error) {
        console.error(`API Error [${accion}]:`, error);
        return { success: false, error: error.message };
      }
    },
    
    async getInitialData() {
      return this.call('getData');
    },
    
    // ✅ CORREGIDO: Retorna pedidos + detalles juntos (son relacionales)
    async getPedidos() {
      const result = await this.call('getData');
      if (!result || !result.success) {
        return { success: false, pedidos: [], detalles_pedido: [] };
      }
      return {
        success: true,
        pedidos: Array.isArray(result.pedidos) ? result.pedidos : [],
        detalles_pedido: Array.isArray(result.detalles_pedido) ? result.detalles_pedido : []
      };
    },
    
    async registrarVenta(order, details) {
      return this.call('registrarVenta', { order, details });
    },
    
    async confirmarPedido(pedidoId) {
      return this.call('confirmarPedido', { pedidoId });
    },
    
    async eliminarPedido(pedidoId) {
      return this.call('eliminarPedido', { pedidoId });
    },
    
    async editarPedido(payload) {
      return this.call('editarPedido', payload);
    },
    
    async crearCliente(nombre, telefono) {
      return this.call('crearCliente', { nombre, telefono });
    },
    
    async actualizarNumeracion(numero) {
      return this.call('actualizarNumeracion', { numero });
    },
    
    async getPedidoCompleto(pedidoId) {
      return this.call('getPedidoCompleto', { pedidoId });
    }
  };

  // ============ SISTEMA DE IMPRESIÓN BLUETOOTH ============
  class ImpresoraDPP350C {
    constructor() {
      this.device = null;
      this.characteristic = null;
      this.conectado = false;
      this.nombreImpresora = null;
    }
    
    async conectar() {
      try {
        this.device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'DPP-350' }, { namePrefix: 'DATECS' }, { namePrefix: 'BT' }],
          optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });
        
        this.nombreImpresora = this.device.name;
        const server = await this.device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        this.characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
        this.conectado = true;
        
        localStorage.setItem('impresoraDPP', JSON.stringify({ id: this.device.id, name: this.device.name }));
        return true;
      } catch (error) {
        console.error('Error de conexión:', error);
        throw error;
      }
    }
    
    async reconectar() {
      const guardada = localStorage.getItem('impresoraDPP');
      if (guardada) {
        try {
          const { id } = JSON.parse(guardada);
          const devices = await navigator.bluetooth.getDevices();
          const device = devices.find(d => d.id === id);
          if (device) {
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            this.characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            this.device = device;
            this.conectado = true;
            this.nombreImpresora = device.name;
            return true;
          }
        } catch (error) {}
      }
      return false;
    }
    
    formatearFecha(fechaStr) {
      if (!fechaStr) return 'Sin fecha';
      const fecha = new Date(fechaStr);
      return `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}-${String(fecha.getDate()).padStart(2,'0')}`;
    }
    
    formatearHora(fechaStr) {
      if (!fechaStr) return 'Sin hora';
      const fecha = new Date(fechaStr);
      return `${String(fecha.getHours()).padStart(2,'0')}:${String(fecha.getMinutes()).padStart(2,'0')}`;
    }
    
    async imprimirFactura(order, detalles) {
      if (!this.conectado) await this.conectar();
      
      const encoder = new TextEncoder();
      let buffer = [];
      const ESC = '\x1B';
      const GS = '\x1D';
      
      buffer.push(encoder.encode(ESC + '@'));
      buffer.push(encoder.encode('═'.repeat(48) + '\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x01'));
      buffer.push(encoder.encode('COTILPEZ S.A.S.\nNIT: 900.000.000-0\n'));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      
      const facturaNumero = order.numero_factura || order.id_pedido;
      buffer.push(encoder.encode(`FACTURA #${facturaNumero}\n`));
      buffer.push(encoder.encode(`FECHA: ${this.formatearFecha(order.fecha)}\n`));
      buffer.push(encoder.encode(`HORA: ${this.formatearHora(order.fecha)}\n`));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      
      buffer.push(encoder.encode(ESC + 'a' + '\x00'));
      buffer.push(encoder.encode(`CLIENTE: ${order.nombre_cliente || 'Consumidor Final'}\n`));
      buffer.push(encoder.encode(`VENDEDOR: ${order.nombre_vendedor || 'Admin'}\n`));
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      buffer.push(encoder.encode('CANT  PRODUCTO                    TOTAL\n'));
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      
      for (const item of detalles) {
        const cantidad = item.cantidad.toString().padStart(4);
        let nombre = item.nombre_producto;
        if (nombre.length > 20) nombre = nombre.substring(0, 18) + '..';
        const precioTotal = '$' + item.subtotal.toLocaleString();
        
        let linea = cantidad + '  ' + nombre;
        let espacios = 48 - linea.length - precioTotal.length;
        if (espacios < 1) espacios = 1;
        linea += ' '.repeat(espacios) + precioTotal;
        buffer.push(encoder.encode(linea + '\n'));
      }
      
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x02'));
      buffer.push(encoder.encode(`TOTAL: $${order.total.toLocaleString()}\n`));
      buffer.push(encoder.encode(ESC + 'a' + '\x00'));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x01'));
      buffer.push(encoder.encode('¡GRACIAS POR SU COMPRA!\n\n\n'));
      buffer.push(encoder.encode(GS + 'V' + '\x41' + '\x00'));
      
      let totalLength = buffer.reduce((sum, arr) => sum + arr.length, 0);
      let result = new Uint8Array(totalLength);
      let offset = 0;
      for (let arr of buffer) {
        result.set(arr, offset);
        offset += arr.length;
      }
      
      await this.characteristic.writeValue(result);
      return true;
    }
    
    desconectar() {
      if (this.device && this.device.gatt.connected) this.device.gatt.disconnect();
      this.conectado = false;
    }
  }
  
  const impresora = new ImpresoraDPP350C();

  // ============ ESTADO GLOBAL ============
  const AppState = {
    // Usuario
    user: null,
    
    // Datos (se cargan una vez al inicio)
    productos: [],
    clientes: [],
    usuarios: [],
    estadisticas: [],
    configNumeracion: { ultimoNumero: 1000 },
    
    // Datos dinámicos (se actualizan independientemente)
    pedidos: [],
    detalles_pedido: [],
    
    // UI
    loading: true,
    activeTab: 'inicio',
    impresoraConectada: false,
    nombreImpresora: null,
    
    // Carrito
    cart: [],
    selectedProduct: null,
    numValue: '0',
    showCart: false,
    showPayment: false,
    selectedClient: null,
    selectedClientName: '',
    selectedCategory: 'TODOS',
    observacion: '',
    
    // Modales
    showOrderDetail: false,
    selectedOrderId: null,
    showClientHistory: false,
    selectedClientForHistory: null,
    showNewClientModal: false,
    showPrintModal: false,
    lastOrderData: null,
    showEditOrderModal: false,
    editingOrder: null,
    editingOrderDetails: [],
    editCart: [],
    editSelectedClient: null,
    editObservacion: '',
    editSelectedProduct: null,
    editNumValue: '0',
    showEditQuantityModal: false,
    editingEditCartIndex: null,
    showConfigNumeracionModal: false,
    nuevoNumeroInicial: '',
    
    // Estados de edición de carrito
    editingCartIndex: null,
    editQuantityValue: '',
    
    // Filtros
    filtroPedidos: { vendedor: 'TODOS', fechaInicio: '', fechaFin: '', tipoFiltro: 'ninguno', orden: 'fecha_desc' },
    filtroTransacciones: { vendedor: 'TODOS', fechaInicio: '', fechaFin: '', tipoFiltro: 'ninguno', orden: 'fecha_desc' },
    
    // Loading buttons
    loadingButtons: {
      registrarVenta: false,
      editarPedido: false,
      eliminarPedido: false,
      confirmarPedido: false,
      actualizarNumeracion: false,
      conectarImpresora: false
    }
  };

  // ============ MÓDULO DE DATOS CON REFRESH LIVIANO ============
  const DataModule = {
    async cargarTodo(mostrarLoading = true) {
      if (mostrarLoading) {
        AppState.loading = true;
        render();
      }
      
      try {
        const data = await API.getInitialData();
        
        if (data && data.success) {
          AppState.productos = data.productos || [];
          AppState.clientes = data.clientes || [];
          AppState.pedidos = this._ordenarPedidos(data.pedidos || []);
          AppState.detalles_pedido = data.detalles_pedido || [];
          AppState.usuarios = data.usuarios || [];
          AppState.estadisticas = data.estadisticas || [];
          AppState.configNumeracion = data.configNumeracion || { ultimoNumero: 1000 };
          
          console.log('✅ Datos sincronizados:', {
            productos: AppState.productos.length,
            clientes: AppState.clientes.length,
            pedidos: AppState.pedidos.length,
            pendientes: PedidosModule.getPendientes().length,
            confirmados: PedidosModule.getConfirmados().length
          });
          return true;
        } else {
          console.error('Error en respuesta:', data);
          alert('Error al cargar datos: ' + (data?.error || 'Desconocido'));
          return false;
        }
      } catch (error) {
        console.error('Error cargando datos:', error);
        alert('Error de conexión: ' + error.message);
        return false;
      } finally {
        AppState.loading = false;
        if (mostrarLoading) render();
        setTimeout(() => autoReconectarImpresora(), 2000);
      }
    },
    
    // ✅ NUEVO: Refresh ligero (solo pedidos + detalles) - mucho más rápido
    async recargarPedidos() {
      try {
        const result = await API.getPedidos();
        if (result && result.success) {
          AppState.pedidos = this._ordenarPedidos(result.pedidos);
          AppState.detalles_pedido = result.detalles_pedido;
          return true;
        }
        return false;
      } catch (error) {
        console.error('Error recargando pedidos:', error);
        return false;
      }
    },
    
    _ordenarPedidos(pedidos) {
      return [...pedidos].sort((a, b) => {
        const fechaA = new Date(a.fecha).getTime() || 0;
        const fechaB = new Date(b.fecha).getTime() || 0;
        return fechaB - fechaA;
      });
    }
  };

  // ============ MÓDULO DE PEDIDOS CORREGIDO ============
  const PedidosModule = {
    // ✅ Normalización para evitar problemas de mayúsculas/espacios/acentos
    _normalizarEstado(estado) {
      return String(estado || '')
        .trim()
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    },
    
    async cargar() {
      return await DataModule.recargarPedidos();
    },
    
    // ✅ CORREGIDO: Filtros tolerantes a inconsistencias del backend
    getPendientes() {
      return AppState.pedidos.filter(p => 
        this._normalizarEstado(p.estado) === 'pendiente'
      );
    },
    
    getConfirmados() {
      return AppState.pedidos.filter(p => {
        const estado = this._normalizarEstado(p.estado);
        return estado === 'confirmado' || estado === 'confirmada';
      });
    },
    
    // ✅ CORREGIDO: Update optimista + sync + transición ordenada de UI
    async confirmar(id) {
      if (AppState.loadingButtons.confirmarPedido) return;
      
      AppState.loadingButtons.confirmarPedido = true;
      render();
      
      const result = await API.confirmarPedido(id);
      
      AppState.loadingButtons.confirmarPedido = false;
      
      if (result && result.success) {
        // 1) Update optimista: marca el pedido como confirmado INMEDIATAMENTE
        const pedido = AppState.pedidos.find(p => 
          String(p.id_pedido) === String(id)
        );
        if (pedido) pedido.estado = 'Confirmado';
        
        // 2) Sync con servidor (solo pedidos, no toda la data)
        await DataModule.recargarPedidos();
        
        // 3) Cambiar tab ANTES del render final (evita doble render)
        AppState.activeTab = 'transacciones';
        render();
        
        // 4) Notificar al usuario al final
        setTimeout(() => alert('✅ Pedido confirmado exitosamente'), 50);
      } else {
        render();
        alert('❌ Error al confirmar: ' + (result?.error || 'Desconocido'));
      }
    },
    
    async eliminar(id) {
      if (AppState.loadingButtons.eliminarPedido) return;
      if (!confirm('⚠️ ¿Eliminar este pedido? No se puede deshacer.')) return;
      
      AppState.loadingButtons.eliminarPedido = true;
      render();
      
      const result = await API.eliminarPedido(id);
      
      AppState.loadingButtons.eliminarPedido = false;
      
      if (result && result.success) {
        // Update optimista
        AppState.pedidos = AppState.pedidos.filter(p => 
          String(p.id_pedido) !== String(id)
        );
        AppState.detalles_pedido = AppState.detalles_pedido.filter(d => 
          String(d.id_pedido) !== String(id)
        );
        
        // Cerrar modales relacionados
        if (AppState.showEditOrderModal) {
          AppState.showEditOrderModal = false;
          AppState.editingOrder = null;
          AppState.editCart = [];
        }
        
        // Sync con servidor
        await DataModule.recargarPedidos();
        render();
        setTimeout(() => alert('✅ Pedido eliminado exitosamente'), 50);
      } else {
        render();
        alert('❌ Error al eliminar: ' + (result?.error || 'Desconocido'));
      }
    },
    
    async editar(payload) {
      if (AppState.loadingButtons.editarPedido) return false;
      
      AppState.loadingButtons.editarPedido = true;
      render();
      
      const result = await API.editarPedido(payload);
      
      AppState.loadingButtons.editarPedido = false;
      
      if (result && result.success) {
        // Sync con servidor (recargar solo pedidos)
        await DataModule.recargarPedidos();
        render();
        setTimeout(() => alert('✅ Pedido editado exitosamente'), 50);
        return true;
      } else {
        render();
        alert('❌ Error al guardar: ' + (result?.error || 'Desconocido'));
        return false;
      }
    },
    
    async registrar(order, details) {
      if (AppState.loadingButtons.registrarVenta) return null;
      
      AppState.loadingButtons.registrarVenta = true;
      render();
      
      const result = await API.registrarVenta(order, details);
      
      AppState.loadingButtons.registrarVenta = false;
      
      if (result && result.success) {
        // Sync con servidor (solo pedidos)
        await DataModule.recargarPedidos();
        
        // Si el backend devuelve el número de factura, actualizar numeración local
        if (result.numeroFactura) {
          AppState.configNumeracion.ultimoNumero = result.numeroFactura;
        }
        
        render();
        return result;
      } else {
        render();
        alert('❌ Error al registrar: ' + (result?.error || 'Desconocido'));
        return null;
      }
    }
  };

  // ============ MÓDULO DE CLIENTES ============
  const ClientesModule = {
    async cargar() {
      try {
        const data = await API.getInitialData();
        AppState.clientes = (data.success && data.clientes) ? data.clientes : [];
        return true;
      } catch (error) {
        console.error('Error cargando clientes:', error);
        return false;
      }
    },
    
    async crear(nombre, telefono) {
      const result = await API.crearCliente(nombre, telefono);
      if (result && result.success) {
        await this.cargar();
        return result;
      }
      return null;
    },
    
    buscar(texto) {
      const searchText = texto.toLowerCase();
      return AppState.clientes.filter(c => 
        (c.nombre || '').toLowerCase().includes(searchText) || 
        (c.telefono || '').includes(searchText)
      );
    },
    
    getHistorial(id) {
      return AppState.pedidos.filter(p => String(p.id_cliente) === String(id));
    }
  };

  // ============ MÓDULO DE PRODUCTOS ============
  const ProductosModule = {
    async cargar() {
      try {
        const data = await API.getInitialData();
        AppState.productos = (data.success && data.productos) ? data.productos : [];
        return true;
      } catch (error) {
        console.error('Error cargando productos:', error);
        return false;
      }
    },
    
    getCategorias() {
      return ['TODOS', ...new Set(AppState.productos.map(p => p.categoría || 'General'))];
    },
    
    filtrarPorCategoria(categoria) {
      if (categoria === 'TODOS') return AppState.productos;
      return AppState.productos.filter(p => p.categoría === categoria);
    },
    
    buscar(texto) {
      const searchText = texto.toLowerCase();
      return AppState.productos.filter(p => 
        (p.nombre || '').toLowerCase().includes(searchText) || 
        (p.código || '').toLowerCase().includes(searchText)
      );
    }
  };

  // ============ FUNCIONES DE IMPRESIÓN ============
  async function conectarImpresora() {
    if (AppState.loadingButtons.conectarImpresora) return;
    AppState.loadingButtons.conectarImpresora = true;
    render();
    
    try {
      const conectado = await impresora.reconectar();
      if (!conectado) await impresora.conectar();
      AppState.impresoraConectada = true;
      AppState.nombreImpresora = impresora.nombreImpresora;
      alert(`✅ Impresora ${AppState.nombreImpresora} conectada`);
    } catch (error) {
      alert('❌ Error al conectar: ' + error.message);
      AppState.impresoraConectada = false;
    } finally {
      AppState.loadingButtons.conectarImpresora = false;
      render();
    }
  }
  
  async function imprimirPedidoBluetooth(orderId) {
    if (!AppState.impresoraConectada) {
      if (confirm('La impresora no está conectada. ¿Conectar ahora?')) {
        await conectarImpresora();
        if (!AppState.impresoraConectada) return;
      } else return;
    }
    
    try {
      const result = await API.getPedidoCompleto(orderId);
      if (!result.order) throw new Error('Pedido no encontrado');
      await impresora.imprimirFactura(result.order, result.details);
      alert('✅ Factura enviada a la impresora');
    } catch (error) {
      alert('❌ Error al imprimir: ' + error.message);
      AppState.impresoraConectada = false;
    }
  }
  
  function imprimirPedidoNormal(orderId) {
    const order = AppState.pedidos.find(p => p.id_pedido === orderId);
    const detalles = AppState.detalles_pedido.filter(d => d.id_pedido === orderId);
    if (order && detalles) {
      AppState.lastOrderData = { order, detalles };
      AppState.showPrintModal = true;
      render();
    }
  }
  
  function mostrarOpcionesImpresion(orderId) {
    if (/Android/i.test(navigator.userAgent)) {
      if (confirm('🖨️ ¿Imprimir por Bluetooth?\n\nAceptar → Bluetooth\nCancelar → Impresión normal')) {
        imprimirPedidoBluetooth(orderId);
      } else {
        imprimirPedidoNormal(orderId);
      }
    } else {
      imprimirPedidoNormal(orderId);
    }
  }
  
  async function autoReconectarImpresora() {
    if (/Android/i.test(navigator.userAgent)) {
      try {
        if (await impresora.reconectar()) {
          AppState.impresoraConectada = true;
          AppState.nombreImpresora = impresora.nombreImpresora;
          render();
        }
      } catch (error) {}
    }
  }

  async function guardarNuevoNumeroInicial() {
    const nuevoNumero = parseInt(document.getElementById('modalNuevoNumero')?.value);
    if (!nuevoNumero || nuevoNumero <= 0) {
      alert('Ingresa un número válido');
      return;
    }
    
    AppState.loadingButtons.actualizarNumeracion = true;
    render();
    
    const result = await API.actualizarNumeracion(nuevoNumero);
    
    AppState.loadingButtons.actualizarNumeracion = false;
    
    if (result && result.success) {
      alert(`✅ Número inicial actualizado a: ${result.nuevoNumero}`);
      AppState.showConfigNumeracionModal = false;
      await DataModule.cargarTodo();
    } else {
      alert('Error al actualizar: ' + (result?.error || 'Desconocido'));
    }
  }

  // ============ FUNCIONES DE VENTA (CARRITO) ============
  function agregarAlCarrito(producto, cantidad) {
    const existing = AppState.cart.find(i => i.product.código === producto.código);
    if (existing) {
      existing.quantity += cantidad;
    } else {
      AppState.cart.push({ product: producto, quantity: cantidad, unitPrice: producto.precio });
    }
    render();
  }
  
  function eliminarDelCarrito(idx) {
    AppState.cart.splice(idx, 1);
    if (AppState.cart.length === 0) AppState.showCart = false;
    render();
  }
  
  // ✅ finalizarVenta corregido - Sin doble render
  async function finalizarVenta() {
    const cartTotal = AppState.cart.reduce((s, i) => s + (i.unitPrice * i.quantity), 0);
    const observacionFinal = document.getElementById('observacionFinal')?.value || AppState.observacion;
    
    const clientId = AppState.selectedClient?.id || 'N/A';
    const clientName = AppState.selectedClient?.nombre || 'Consumidor Final';
    
    const order = {
      fecha: '',
      id_cliente: clientId,
      nombre_cliente: clientName,
      id_vendedor: AppState.user?.id || '1',
      nombre_vendedor: AppState.user?.nombre || 'Admin',
      total: cartTotal,
      estado: 'Pendiente',
      observacion: observacionFinal
    };
    
    const details = AppState.cart.map((item, idx) => ({
      id_detail: 'TEMP-' + Date.now() + '-' + idx,
      id_pedido: 'TEMPORAL',
      codigo_producto: item.product.código,
      nombre_producto: item.product.nombre,
      cantidad: item.quantity,
      precio_unitario: item.unitPrice,
      subtotal: item.unitPrice * item.quantity
    }));
    
    const result = await PedidosModule.registrar(order, details);
    
    if (result && result.success) {
      // Limpiar carrito y estado de venta
      AppState.cart = [];
      AppState.showPayment = false;
      AppState.showCart = false;
      AppState.selectedClient = null;
      AppState.selectedClientName = '';
      AppState.observacion = '';
      
      // ✅ Cambiar tab ANTES del render para evitar parpadeos
      AppState.activeTab = 'pedidos';
      render();
      
      setTimeout(() => {
        alert(`✅ Venta registrada con Factura #${result.numeroFactura}`);
      }, 50);
    }
  }

  // ============ FUNCIONES DE EDICIÓN DE PEDIDO ============
  function abrirEditarPedido(id) {
    const order = AppState.pedidos.find(p => p.id_pedido === id);
    const details = AppState.detalles_pedido.filter(d => d.id_pedido === id);
    
    if (!order) {
      alert('Pedido no encontrado');
      return;
    }
    
    if (order.estado !== 'Pendiente') {
      alert('Solo se pueden editar pedidos en estado "Pendiente"');
      return;
    }
    
    AppState.editingOrder = JSON.parse(JSON.stringify(order));
    AppState.editingOrderDetails = JSON.parse(JSON.stringify(details));
    AppState.editCart = details.map(d => ({
      product: { código: d.codigo_producto, nombre: d.nombre_producto, precio: d.precio_unitario },
      quantity: d.cantidad,
      unitPrice: d.precio_unitario
    }));
    AppState.editObservacion = order.observacion || '';
    AppState.editSelectedClient = { id: order.id_cliente, nombre: order.nombre_cliente };
    AppState.showEditOrderModal = true;
    render();
  }
  
  async function guardarEdicionPedido() {
    if (AppState.editCart.length === 0) {
      alert('El pedido debe tener al menos un producto');
      return;
    }
    
    const newTotal = AppState.editCart.reduce((s, i) => s + (i.unitPrice * i.quantity), 0);
    const clienteId = AppState.editSelectedClient?.id || AppState.editingOrder.id_cliente;
    const clienteNombre = AppState.editSelectedClient?.nombre || AppState.editingOrder.nombre_cliente;
    const observacion = document.getElementById('editObservacionOrder')?.value || AppState.editObservacion;
    
    const updatedOrder = {
      ...AppState.editingOrder,
      id_cliente: clienteId,
      nombre_cliente: clienteNombre,
      total: newTotal,
      observacion: observacion
    };
    
    const newDetails = AppState.editCart.map((item, idx) => ({
      id_detail: `${AppState.editingOrder.id_pedido}-${idx}-${Date.now()}`,
      id_pedido: AppState.editingOrder.id_pedido,
      codigo_producto: item.product.código,
      nombre_producto: item.product.nombre,
      cantidad: item.quantity,
      precio_unitario: item.unitPrice,
      subtotal: item.unitPrice * item.quantity
    }));
    
    const payload = {
      orderId: AppState.editingOrder.id_pedido,
      order: updatedOrder,
      details: newDetails,
      oldDetails: AppState.editingOrderDetails,
      oldOrder: AppState.editingOrder
    };
    
    const success = await PedidosModule.editar(payload);
    if (success) {
      AppState.showEditOrderModal = false;
      AppState.editingOrder = null;
      AppState.editCart = [];
    }
  }

  function formatFecha(fecha) {
    if (!fecha) return 'Sin fecha';
    if (typeof fecha === 'string') return fecha.replace('T', ' ');
    if (fecha instanceof Date) {
      return `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}-${String(fecha.getDate()).padStart(2,'0')} ${String(fecha.getHours()).padStart(2,'0')}:${String(fecha.getMinutes()).padStart(2,'0')}`;
    }
    return String(fecha);
  }

      if (container) container.innerHTML = filtered.map(c => `<div class="bg-white rounded-xl p-3 shadow-sm border flex justify-between"><div><p class="font-bold">${c.nombre}</p><p class="text-xs text-gray-400">📞 ${c.telefono || ''}</p></div><button onclick="verHistorialCliente(${c.id})" class="bg-gray-100 px-3 py-2 rounded-lg">Historial</button></div>`).join('');
    };
    input.addEventListener('input', filterList);
  }
  
  function setupEditClientSearch() {
    const input = document.getElementById('editClientSearch');
    if (!input) return;
    const updateDropdown = () => {
      const filtered = ClientesModule.buscar(input.value);
      const dropdown = document.getElementById('editClientDropdown');
      if (dropdown && filtered.length > 0) {
        dropdown.innerHTML = filtered.map(c => `<button onclick="selectEditClient(${c.id}, '${c.nombre.replace(/'/g, "\\'")}')" class="w-full text-left p-3 hover:bg-gray-50 border-b">${c.nombre}</button>`).join('');
        dropdown.style.display = 'block';
      } else if (dropdown) dropdown.style.display = 'none';
    };
    input.addEventListener('input', updateDropdown);
    document.addEventListener('click', (e) => { const d = document.getElementById('editClientDropdown'); if (d && !input.contains(e.target) && !d.contains(e.target)) d.style.display = 'none'; });
  }
  
  function setupEditProductSearch() {
    const input = document.getElementById('editProductSearch');
    if (!input) return;
    const updateDropdown = () => {
      const filtered = ProductosModule.buscar(input.value);
      const dropdown = document.getElementById('editProductDropdown');
      if (dropdown && filtered.length > 0) {
        dropdown.innerHTML = filtered.map(p => `<button onclick="addProductToEditCart('${p.código}')" class="w-full text-left p-3 hover:bg-gray-50 border-b"><div class="flex justify-between"><span>${p.nombre}</span><span class="text-teal-600">$${Number(p.precio).toLocaleString()}</span></div><div class="text-xs text-gray-400">Stock: ${p.stock || 0}</div></button>`).join('');
        dropdown.style.display = 'block';
      } else if (dropdown) dropdown.style.display = 'none';
    };
    input.addEventListener('input', updateDropdown);
    document.addEventListener('click', (e) => { const d = document.getElementById('editProductDropdown'); if (d && !input.contains(e.target) && !d.contains(e.target)) d.style.display = 'none'; });
  }

  // Inicializar
  DataModule.cargarTodo();
</script>
</body>
