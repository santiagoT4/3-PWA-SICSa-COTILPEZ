  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    * { font-family: 'Inter', sans-serif; }

    button:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

<body class="bg-gray-100">

<div id="app" class="min-h-screen"></div>

<script>
  // ============ CONFIGURACIÓN ============
  const API_URL = 'https://script.google.com/macros/s/AKfycbxY_j1xt15EyFPIefSQ1XVNQ0k6L2cZMwgcETq2VgR0M8foSalcGnSnpcMOyRNqPu1aAg/exec';
  // ============================================================================

  // ============ SISTEMA DE IMPRESIÓN BLUETOOTH PARA DPP-350C ============
  class ImpresoraDPP350C {
    constructor() {
      this.device = null;
      this.characteristic = null;
      this.conectado = false;
      this.nombreImpresora = null;
    }
    
    async conectar() {
      try {
        this.device = await navigator.bluetooth.requestDevice({
          filters: [
            { namePrefix: 'DPP-350' },
            { namePrefix: 'DATECS' },
            { namePrefix: 'BT' }
          ],
          optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });
        
        this.nombreImpresora = this.device.name;
        const server = await this.device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        this.characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
        
        this.conectado = true;
        localStorage.setItem('impresoraDPP', JSON.stringify({
          id: this.device.id,
          name: this.device.name
        }));
        
        return true;
      } catch (error) {
        console.error('Error de conexión:', error);
        throw error;
      }
    }
    
    async reconectar() {
      const guardada = localStorage.getItem('impresoraDPP');
      if (guardada) {
        try {
          const { id } = JSON.parse(guardada);
          const devices = await navigator.bluetooth.getDevices();
          const device = devices.find(d => d.id === id);
          if (device) {
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            this.characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
            this.device = device;
            this.conectado = true;
            this.nombreImpresora = device.name;
            return true;
          }
        } catch (error) {
          console.log('Reconexión fallida:', error);
        }
      }
      return false;
    }
    
    formatearFecha(fechaStr) {
      if (!fechaStr) return 'Sin fecha';
      const fecha = new Date(fechaStr);
      const year = fecha.getFullYear();
      const month = String(fecha.getMonth() + 1).padStart(2, '0');
      const day = String(fecha.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    
    formatearHora(fechaStr) {
      if (!fechaStr) return 'Sin hora';
      const fecha = new Date(fechaStr);
      const hours = String(fecha.getHours()).padStart(2, '0');
      const minutes = String(fecha.getMinutes()).padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    
    async imprimirFactura(order, detalles) {
      if (!this.conectado) {
        await this.conectar();
      }
      
      const encoder = new TextEncoder();
      let buffer = [];
      
      const ESC = '\x1B';
      const GS = '\x1D';
      
      buffer.push(encoder.encode(ESC + '@'));
      buffer.push(encoder.encode('═'.repeat(48) + '\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x01'));
      buffer.push(encoder.encode('COTILPEZ S.A.S.\n'));
      buffer.push(encoder.encode('NIT: 900.000.000-0\n'));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      
      const facturaNumero = order.numero_factura || order.id_pedido;
      buffer.push(encoder.encode('FACTURA #' + facturaNumero + '\n'));
      buffer.push(encoder.encode('FECHA: ' + this.formatearFecha(order.fecha) + '\n'));
      buffer.push(encoder.encode('HORA: ' + this.formatearHora(order.fecha) + '\n'));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      
      buffer.push(encoder.encode(ESC + 'a' + '\x00'));
      buffer.push(encoder.encode('CLIENTE: ' + (order.nombre_cliente || 'Consumidor Final') + '\n'));
      buffer.push(encoder.encode('VENDEDOR: ' + (order.nombre_vendedor || 'Admin') + '\n'));
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      buffer.push(encoder.encode('CANT  PRODUCTO                    TOTAL\n'));
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      
      for (const item of detalles) {
        const cantidad = item.cantidad.toString().padStart(4);
        let nombre = item.nombre_producto;
        if (nombre.length > 20) nombre = nombre.substring(0, 18) + '..';
        const precioTotal = '$' + item.subtotal.toLocaleString();
        
        let linea = cantidad + '  ' + nombre;
        let espacios = 48 - linea.length - precioTotal.length;
        if (espacios < 1) espacios = 1;
        linea += ' '.repeat(espacios) + precioTotal;
        buffer.push(encoder.encode(linea + '\n'));
      }
      
      buffer.push(encoder.encode('────────────────────────────────────────────────\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x02'));
      buffer.push(encoder.encode('TOTAL: $' + order.total.toLocaleString() + '\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x00'));
      buffer.push(encoder.encode('════════════════════════════════════════════\n'));
      buffer.push(encoder.encode(ESC + 'a' + '\x01'));
      buffer.push(encoder.encode('¡GRACIAS POR SU COMPRA!\n'));
      buffer.push(encoder.encode('\n\n'));
      buffer.push(encoder.encode(GS + 'V' + '\x41' + '\x00'));
      
      let totalLength = buffer.reduce((sum, arr) => sum + arr.length, 0);
      let result = new Uint8Array(totalLength);
      let offset = 0;
      for (let arr of buffer) {
        result.set(arr, offset);
        offset += arr.length;
      }
      
      await this.characteristic.writeValue(result);
      return true;
    }
    
    desconectar() {
      if (this.device && this.device.gatt.connected) {
        this.device.gatt.disconnect();
      }
      this.conectado = false;
    }
  }
  
  const impresora = new ImpresoraDPP350C();
  
  // Estado global con versionado para forzar reactividad
  let state = {
    user: null,
    productos: [],
    clientes: [],
    pedidos: [],
    detalles_pedido: [],
    transacciones: [],
    estadisticas: [],
    usuarios: [],
    configNumeracion: { ultimoNumero: 1000 },
    loading: true,
    activeTab: 'inicio',
    cart: [],
    selectedProduct: null,
    numValue: '0',
    showCart: false,
    showPayment: false,
    selectedClient: null,
    selectedClientName: '',
    searchProductText: '',
    searchClientTextVender: '',
    searchClientTextClientes: '',
    selectedCategory: 'TODOS',
    editingCartIndex: null,
    editQuantityValue: '',
    showOrderDetail: false,
    selectedOrderId: null,
    showClientHistory: false,
    selectedClientForHistory: null,
    showNewClientModal: false,
    newClientName: '',
    newClientPhone: '',
    observacion: '',
    showPrintModal: false,
    lastOrderData: null,
    showEditOrderModal: false,
    editingOrder: null,
    editingOrderDetails: [],
    editingOrderOldData: null,
    editCart: [],
    editSelectedProduct: null,
    editNumValue: '0',
    editObservacion: '',
    editSelectedClient: null,
    showEditQuantityModal: false,
    editingEditCartIndex: null,
    showConfigNumeracionModal: false,
    nuevoNumeroInicial: '',
    impresoraConectada: false,
    nombreImpresora: null,
    dataVersion: 0,  // <-- VERSIONADO PARA FORZAR REACTIVIDAD
    loadingButtons: {
      registrarVenta: false,
      editarPedido: false,
      eliminarPedido: false,
      confirmarPedido: false,
      actualizarNumeracion: false,
      conectarImpresora: false
    },
    filtroPedidos: {
      vendedor: 'TODOS',
      fechaInicio: '',
      fechaFin: '',
      tipoFiltro: 'ninguno',
      orden: 'fecha_desc'
    },
    filtroTransacciones: {
      vendedor: 'TODOS',
      fechaInicio: '',
      fechaFin: '',
      tipoFiltro: 'ninguno',
      orden: 'fecha_desc'
    }
  };

  function formatFecha(fecha) {
    if (!fecha) return 'Sin fecha';
    if (typeof fecha === 'string') {
      return fecha.replace('T', ' ');
    }
    if (fecha instanceof Date) {
      const year = fecha.getFullYear();
      const month = String(fecha.getMonth() + 1).padStart(2, '0');
      const day = String(fecha.getDate()).padStart(2, '0');
      const hours = String(fecha.getHours()).padStart(2, '0');
      const minutes = String(fecha.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day} ${hours}:${minutes}`;
    }
    return String(fecha);
  }

  function getNumeroFactura(pedido) {
    return pedido.numero_factura || pedido.id_pedido;
  }

  // ============ FUNCIÓN DE COMUNICACIÓN CON APPS SCRIPT ============
  async function llamarAPI(accion, payload = null) {
    try {
      const body = { accion };
      if (payload) body.payload = payload;
      
      const respuesta = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(body)
      });
      
      if (!respuesta.ok) {
        throw new Error(`HTTP ${respuesta.status}: ${respuesta.statusText}`);
      }
      
      const textoRespuesta = await respuesta.text();
      if (!textoRespuesta || textoRespuesta.trim() === '') {
        return { success: false, error: 'Respuesta vacía del servidor' };
      }
      
      const datos = JSON.parse(textoRespuesta);
      return datos;
      
    } catch (error) {
      console.error('Error en llamada API:', error);
      return { success: false, error: error.message };
    }
  }

  // Función para clonar profundamente los datos y forzar nuevos arrays
  function clonarDatos(data) {
    return JSON.parse(JSON.stringify(data));
  }

  async function refreshData() {
    state.loading = true;
    render();
    
    try {
      const resultado = await llamarAPI('getData');
      
      if (resultado.success !== false) {
        // CLONACIÓN PROFUNDA para romper referencias
        state.productos = clonarDatos(resultado.productos || []);
        state.clientes = clonarDatos(resultado.clientes || []);
        state.pedidos = clonarDatos(resultado.pedidos || []).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        state.detalles_pedido = clonarDatos(resultado.detalles_pedido || []);
        state.transacciones = clonarDatos(resultado.transacciones || []);
        state.estadisticas = clonarDatos(resultado.estadisticas || []);
        state.usuarios = clonarDatos(resultado.usuarios || []);
        state.configNumeracion = clonarDatos(resultado.configNumeracion || { ultimoNumero: 1000 });
        
        // INCREMENTAR VERSIÓN para forzar recálculo en todas las funciones que dependen de los datos
        state.dataVersion++;
        
        console.log('✅ Datos cargados correctamente (v' + state.dataVersion + '):', {
          productos: state.productos.length,
          clientes: state.clientes.length,
          pedidos: state.pedidos.length,
          detalles: state.detalles_pedido.length
        });
      } else {
        console.error('Error en respuesta:', resultado);
        alert('Error al cargar datos: ' + (resultado.error || 'Desconocido'));
      }
    } catch (error) {
      console.error('Error en refreshData:', error);
      alert('Error de conexión: ' + error.message);
    }
    
    state.loading = false;
    render();
    setTimeout(autoReconectarImpresora, 2000);
  }

  // ============ FUNCIONES DE IMPRESIÓN BLUETOOTH ============
  async function conectarImpresora() {
    if (state.loadingButtons.conectarImpresora) return;
    state.loadingButtons.conectarImpresora = true;
    render();
    
    try {
      const conectado = await impresora.reconectar();
      if (!conectado) {
        await impresora.conectar();
      }
      state.impresoraConectada = true;
      state.nombreImpresora = impresora.nombreImpresora;
      alert(`✅ Impresora ${state.nombreImpresora} conectada`);
    } catch (error) {
      alert('❌ Error al conectar: ' + error.message);
      state.impresoraConectada = false;
    } finally {
      state.loadingButtons.conectarImpresora = false;
      render();
    }
  }
  
  async function imprimirPedidoBluetooth(orderId) {
    if (!state.impresoraConectada) {
      const conectar = confirm('La impresora no está conectada. ¿Conectar ahora?');
      if (conectar) {
        await conectarImpresora();
        if (!state.impresoraConectada) return;
      } else {
        return;
      }
    }
    
    try {
      const resultado = await llamarAPI('getPedidoCompleto', { pedidoId: orderId });
      if (!resultado.success && !resultado.order) throw new Error('Pedido no encontrado');
      
      await impresora.imprimirFactura(resultado.order, resultado.details);
      alert('✅ Factura enviada a la impresora');
    } catch (error) {
      alert('❌ Error al imprimir: ' + error.message);
      state.impresoraConectada = false;
    }
  }
  
  function imprimirPedidoNormal(orderId) {
    const order = state.pedidos.find(p => p.id_pedido === orderId);
    const detalles = state.detalles_pedido.filter(d => d.id_pedido === orderId);
    if (order && detalles) {
      state.lastOrderData = { order: clonarDatos(order), detalles: clonarDatos(detalles) };
      state.showPrintModal = true;
      render();
    }
  }
  
  function mostrarOpcionesImpresion(orderId) {
    const isAndroid = /Android/i.test(navigator.userAgent);
    if (isAndroid) {
      const opcion = confirm('🖨️ Opciones de impresión:\n\n✓ Aceptar → Bluetooth (DPP-350C)\n✓ Cancelar → Impresión normal');
      if (opcion) {
        imprimirPedidoBluetooth(orderId);
      } else {
        imprimirPedidoNormal(orderId);
      }
    } else {
      imprimirPedidoNormal(orderId);
    }
  }
  
  async function autoReconectarImpresora() {
    if (/Android/i.test(navigator.userAgent)) {
      try {
        const conectado = await impresora.reconectar();
        if (conectado) {
          state.impresoraConectada = true;
          state.nombreImpresora = impresora.nombreImpresora;
        }
      } catch (error) {}
      render();
    }
  }

  // ============ FUNCIONES DE NEGOCIO CON FORZADO DE REFRESH ============
  async function confirmarPedido(id) {
    if (confirm('¿Confirmar este pedido?')) {
      setButtonLoading('confirmarPedido', true);
      const resultado = await llamarAPI('confirmarPedido', { pedidoId: id });
      setButtonLoading('confirmarPedido', false);
      if (resultado.success) {
        await refreshData();
        // Pequeño retraso para asegurar que el estado se actualizó
        setTimeout(() => {
          alert('Pedido confirmado exitosamente');
        }, 100);
      } else {
        alert('Error al confirmar: ' + (resultado.error || 'Desconocido'));
      }
    }
  }
  
  async function eliminarPedidoDesdeEdicion(pedidoId) {
    if (confirm('⚠️ ¿Estás seguro de que quieres ELIMINAR este pedido?\n\nEsta acción no se puede deshacer.\n¿Continuar?')) {
      setButtonLoading('eliminarPedido', true);
      const resultado = await llamarAPI('eliminarPedido', pedidoId);
      setButtonLoading('eliminarPedido', false);
      if (resultado.success) {
        alert('✅ Pedido eliminado exitosamente');
        closeEditOrderModal();
        await refreshData();
      } else {
        alert('❌ Error al eliminar: ' + (resultado.error || 'Desconocido'));
      }
    }
  }
  
  async function guardarNuevoNumeroInicial() {
    const nuevoNumero = parseInt(document.getElementById('modalNuevoNumero')?.value);
    if (!nuevoNumero || nuevoNumero <= 0) {
      alert('Por favor ingresa un número válido');
      return;
    }
    
    setButtonLoading('actualizarNumeracion', true);
    const resultado = await llamarAPI('actualizarNumeracion', { numero: nuevoNumero });
    setButtonLoading('actualizarNumeracion', false);
    
    if (resultado.success) {
      alert(`✅ Número inicial actualizado a: ${resultado.nuevoNumero}\nLa próxima factura será: ${resultado.nuevoNumero}`);
      cerrarModalConfiguracionNumeracion();
      await refreshData();
    } else {
      alert('Error al actualizar: ' + (resultado.error || 'Desconocido'));
    }
  }
  
  async function saveNewClient() {
    const name = document.getElementById('newClientName')?.value;
    const phone = document.getElementById('newClientPhone')?.value;
    if (name) {
      const resultado = await llamarAPI('crearCliente', { nombre: name, telefono: phone });
      if (resultado.success) {
        await refreshData();
        closeNewClientModal();
      } else {
        alert('Error al crear cliente');
      }
    } else {
      alert('Ingrese un nombre');
    }
  }
  
  async function completeSale() {
    const cartTotal = state.cart.reduce((s, i) => s + ((i.unitPrice || i.product.precio) * i.quantity), 0);
    const observacionFinal = document.getElementById('observacionFinal')?.value || state.observacion;
    
    let clientId = 'N/A', clientName = 'Consumidor Final';
    if (state.selectedClient) {
      clientId = state.selectedClient.id;
      clientName = state.selectedClient.nombre;
    }
    
    const order = { 
      fecha: '',
      id_cliente: clientId, 
      nombre_cliente: clientName,
      id_vendedor: state.user?.id || '1', 
      nombre_vendedor: state.user?.nombre || 'Admin', 
      total: cartTotal, 
      estado: 'Pendiente',
      observacion: observacionFinal
    };
    
    const details = state.cart.map((item, idx) => ({ 
      id_detail: 'TEMP-' + Date.now() + '-' + idx,
      id_pedido: 'TEMPORAL',
      codigo_producto: item.product.código, 
      nombre_producto: item.product.nombre, 
      cantidad: item.quantity, 
      precio_unitario: item.unitPrice || item.product.precio,
      subtotal: (item.unitPrice || item.product.precio) * item.quantity 
    }));
    
    setButtonLoading('registrarVenta', true);
    
    const resultado = await llamarAPI('registrarVenta', { order, details });
    
    setButtonLoading('registrarVenta', false);
    
    if (resultado.success) {
      state.cart = []; 
      state.showPayment = false; 
      state.selectedClient = null;
      state.selectedClientName = '';
      state.observacion = '';
      await refreshData(); 
      alert(`✅ Venta registrada con Factura #${resultado.numeroFactura}\nID Pedido: ${resultado.orderId}\nEl pedido está pendiente de confirmación.`);
    } else {
      alert('Error al registrar: ' + (resultado.error || 'Desconocido'));
    }
  }
  
  async function guardarEdicionPedido() {
    if (state.editCart.length === 0) {
      alert('El pedido debe tener al menos un producto');
      return;
    }
    
    const newTotal = state.editCart.reduce((s, i) => s + ((i.unitPrice || i.product.precio) * i.quantity), 0);
    const clienteId = state.editSelectedClient?.id || state.editingOrder.id_cliente;
    const clienteNombre = state.editSelectedClient?.nombre || state.editingOrder.nombre_cliente;
    const observacion = document.getElementById('editObservacionOrder')?.value || state.editObservacion;
    
    const updatedOrder = {
      ...state.editingOrder,
      id_cliente: clienteId,
      nombre_cliente: clienteNombre,
      total: newTotal,
      observacion: observacion
    };
    
    const newDetails = state.editCart.map((item, idx) => ({
      id_detail: `${state.editingOrder.id_pedido}-${idx}-${Date.now()}`,
      id_pedido: state.editingOrder.id_pedido,
      codigo_producto: item.product.código,
      nombre_producto: item.product.nombre,
      cantidad: item.quantity,
      precio_unitario: item.unitPrice || item.product.precio,
      subtotal: (item.unitPrice || item.product.precio) * item.quantity
    }));
    
    const payload = {
      orderId: state.editingOrder.id_pedido,
      order: updatedOrder,
      details: newDetails,
      oldDetails: state.editingOrderDetails,
      oldOrder: state.editingOrder
    };
    
    setButtonLoading('editarPedido', true);
    
    const resultado = await llamarAPI('editarPedido', payload);
    
    setButtonLoading('editarPedido', false);
    
    if (resultado.success) {
      alert('✅ Pedido editado exitosamente');
      await refreshData();
      closeEditOrderModal();
    } else {
      alert('Error al guardar: ' + (resultado.error || 'Desconocido'));
    }
  }

  // ============ FUNCIONES DE RENDER ============
  function setButtonLoading(buttonName, isLoading) {
    state.loadingButtons[buttonName] = isLoading;
    render();
  }

  function render() {
    const app = document.getElementById('app');
    if (state.loading) {
      app.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen gap-4"><div class="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin"></div><p class="text-gray-600 font-medium">Cargando Cotilpez POS...</p></div>`;
      return;
    }
    if (!state.user) renderLogin();
    else renderMainApp();
  }

  function renderLogin() {
    const activeUsers = state.usuarios.filter(u => u.activo === true);

  // ============ FUNCIÓN CORREGIDA DE PEDIDOS ============
  function filtrarOrdenarPedidos() {
    // Crear una COPIA NUEVA del array de pedidos con spread operator
    let pedidosFiltrados = [...state.pedidos];
    
    if (state.filtroPedidos.vendedor !== 'TODOS') {
      pedidosFiltrados = pedidosFiltrados.filter(p => p.nombre_vendedor === state.filtroPedidos.vendedor);
    }
    
    if (state.filtroPedidos.tipoFiltro === 'fecha' && state.filtroPedidos.fechaInicio) {
      const fechaInicio = new Date(state.filtroPedidos.fechaInicio);
      fechaInicio.setHours(0,0,0,0);
      pedidosFiltrados = pedidosFiltrados.filter(p => {
        const fechaPedido = new Date(p.fecha);
        return fechaPedido >= fechaInicio;
      });
    } else if (state.filtroPedidos.tipoFiltro === 'rango' && state.filtroPedidos.fechaInicio && state.filtroPedidos.fechaFin) {
      const fechaInicio = new Date(state.filtroPedidos.fechaInicio);
      const fechaFin = new Date(state.filtroPedidos.fechaFin);
      fechaInicio.setHours(0,0,0,0);
      fechaFin.setHours(23,59,59,999);
      pedidosFiltrados = pedidosFiltrados.filter(p => {
        const fechaPedido = new Date(p.fecha);
        return fechaPedido >= fechaInicio && fechaPedido <= fechaFin;
      });
    }
    
    pedidosFiltrados.sort((a, b) => {
      if (state.filtroPedidos.orden === 'fecha_desc') return new Date(b.fecha) - new Date(a.fecha);
      if (state.filtroPedidos.orden === 'fecha_asc') return new Date(a.fecha) - new Date(b.fecha);
      if (state.filtroPedidos.orden === 'consecutivo_desc') return (b.numero_factura || 0) - (a.numero_factura || 0);
      if (state.filtroPedidos.orden === 'consecutivo_asc') return (a.numero_factura || 0) - (b.numero_factura || 0);
      if (state.filtroPedidos.orden === 'total_desc') return b.total - a.total;
      if (state.filtroPedidos.orden === 'total_asc') return a.total - b.total;
      return 0;
    });
    
    return pedidosFiltrados;
  }

          </div>
          <div class="flex gap-3">

                    ${state.loadingButtons.eliminarPedido ? 'disabled' : ''}>

              ${state.loadingButtons.editarPedido ? '<span class="spinner"></span>Guardando...' : '💾 Guardar Cambios'}

  function renderEditQuantityModal() {
    return `
      <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full">
          <div class="p-4 border-b flex justify-between items-center">
            <h2 class="font-bold text-lg">✏️ Editar cantidad</h2>
            <button onclick="closeEditQuantityModal()" class="text-2xl text-gray-400">✕</button>
          </div>
          <div class="p-6">
            <div class="text-center mb-6">
              <div class="text-7xl font-bold text-teal-600 border-b-4 border-teal-600 pb-2 inline-block px-8">
                ${state.editNumValue}
              </div>
            </div>
            <div class="grid grid-cols-3 gap-2 max-w-xs mx-auto">
              ${[1,2,3,4,5,6,7,8,9,'.',0,'del'].map(k => `
                <button onclick="handleEditQuantityKeypad('${k}')" 
                        class="h-16 text-2xl font-bold bg-gray-100 rounded-xl active:bg-gray-200 hover:bg-gray-200 transition">
                  ${k === 'del' ? '⌫' : k}
                </button>
              `).join('')}
            </div>
            <button onclick="saveEditQuantity()" 
                    class="w-full bg-teal-600 text-white py-3 rounded-xl font-bold text-lg mt-6">
              ✓ Guardar cantidad
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function setupEditClientSearch() {
    const input = document.getElementById('editClientSearch');
    if (!input) return;
    
    const updateDropdown = () => {
      const searchText = input.value.toLowerCase();
      const filtered = state.clientes.filter(c => 
        (c.nombre || '').toLowerCase().includes(searchText)
      ).slice(0, 8);
      
      const dropdown = document.getElementById('editClientDropdown');
      if (dropdown && searchText.length > 0 && filtered.length > 0) {
        dropdown.innerHTML = filtered.map(c => `
          <button onclick="selectEditClient(${c.id}, '${c.nombre.replace(/'/g, "\\'")}', '${(c.telefono || '').replace(/'/g, "\\'")}')" 
                  class="w-full text-left p-3 hover:bg-gray-50 border-b last:border-b-0">
            <div class="font-medium">${c.nombre}</div>
            <div class="text-xs text-gray-400">📞 ${c.telefono || 'Sin teléfono'}</div>
          </button>
        `).join('');
        dropdown.style.display = 'block';
      } else if (dropdown) {
        dropdown.style.display = 'none';
      }
    };
    
    input.removeEventListener('input', updateDropdown);
    input.addEventListener('input', updateDropdown);
    input.addEventListener('focus', updateDropdown);
    
    document.removeEventListener('click', window._closeClientDropdown);
    window._closeClientDropdown = (e) => {
      const dropdown = document.getElementById('editClientDropdown');
      if (dropdown && !input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = 'none';
      }
    };
    document.addEventListener('click', window._closeClientDropdown);
  }

  function setupEditProductSearch() {
    const input = document.getElementById('editProductSearch');
    if (!input) return;
    
    const updateDropdown = () => {
      const searchText = input.value.toLowerCase();
      const filtered = state.productos.filter(p => 
        (p.nombre || '').toLowerCase().includes(searchText) || 
        (p.código || '').toLowerCase().includes(searchText)
      ).slice(0, 10);
      
      const dropdown = document.getElementById('editProductDropdown');
      if (dropdown && searchText.length > 0 && filtered.length > 0) {
        dropdown.innerHTML = filtered.map(p => `
          <button onclick="addProductToEditCart('${p.código}')" 
                  class="w-full text-left p-3 hover:bg-gray-50 border-b last:border-b-0">
            <div class="flex justify-between items-center">
              <div>
                <div class="font-medium">${p.nombre}</div>
                <div class="text-xs text-gray-400">Cód: ${p.código} | Stock: ${p.stock || 0}</div>
              </div>
              <div class="text-teal-600 font-bold text-lg">$${Number(p.precio).toLocaleString()}</div>
            </div>
          </button>
        `).join('');
        dropdown.style.display = 'block';
      } else if (dropdown) {
        dropdown.style.display = 'none';
      }
    };
    
    input.removeEventListener('input', updateDropdown);
    input.addEventListener('input', updateDropdown);
    input.addEventListener('focus', updateDropdown);
    
    document.removeEventListener('click', window._closeProductDropdown);
    window._closeProductDropdown = (e) => {
      const dropdown = document.getElementById('editProductDropdown');
      if (dropdown && !input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = 'none';
      }
    };
    document.addEventListener('click', window._closeProductDropdown);
  }

  window.selectEditClient = (id, nombre, telefono) => {
    state.editSelectedClient = { id, nombre, telefono };
    const input = document.getElementById('editClientSearch');
    if (input) input.value = nombre;
    const dropdown = document.getElementById('editClientDropdown');
    if (dropdown) dropdown.style.display = 'none';
    render();
  };

  window.openNewClientModalFromEdit = () => {
    state.showNewClientModal = true;
    state.newClientCallback = (client) => {
      state.editSelectedClient = client;
      const input = document.getElementById('editClientSearch');
      if (input) input.value = client.nombre;
    };
    render();
  };

  window.addProductToEditCart = (code) => {
    const product = state.productos.find(p => p.código === code);
    if (product) {
      state.editSelectedProduct = product;
      state.editNumValue = '1';
      state.showEditQuantityModal = true;
      const input = document.getElementById('editProductSearch');
      if (input) input.value = '';
      const dropdown = document.getElementById('editProductDropdown');
      if (dropdown) dropdown.style.display = 'none';
      render();
    }
  };

  window.openEditQuantityModal = (idx) => {
    state.editingEditCartIndex = idx;
    state.editNumValue = state.editCart[idx].quantity.toString();
    state.showEditQuantityModal = true;
    render();
  };

  window.handleEditQuantityKeypad = (key) => {
    if (key === 'del') {
      state.editNumValue = state.editNumValue.length > 1 ? state.editNumValue.slice(0, -1) : '0';
    } else if (key === '.') {
      if (!state.editNumValue.includes('.')) state.editNumValue = state.editNumValue + '.';
    } else {
      let newVal = state.editNumValue === '0' ? key : state.editNumValue + key;
      if (parseFloat(newVal) <= 999999) state.editNumValue = newVal;
    }
    render();
  };

  window.saveEditQuantity = () => {
    let qty = parseFloat(state.editNumValue);
    if (isNaN(qty) || qty <= 0) {
      alert('Cantidad inválida');
      return;
    }
    
    if (state.editSelectedProduct) {
      const existing = state.editCart.find(i => i.product.código === state.editSelectedProduct.código);
      if (existing) {
        existing.quantity += qty;
      } else {
        state.editCart.push({ 
          product: state.editSelectedProduct, 
          quantity: qty,
          unitPrice: state.editSelectedProduct.precio
        });
      }
      state.editSelectedProduct = null;
    } else if (state.editingEditCartIndex !== null) {
      state.editCart[state.editingEditCartIndex].quantity = qty;
      state.editingEditCartIndex = null;
    }
    
    state.showEditQuantityModal = false;
    render();
  };

  window.closeEditQuantityModal = () => {
    state.showEditQuantityModal = false;
    state.editSelectedProduct = null;
    state.editingEditCartIndex = null;
    render();
  };

  window.updateEditCartPrice = (index, newPrice) => {
    let price = parseFloat(newPrice);
    if (!isNaN(price) && price > 0) {
      state.editCart[index].unitPrice = price;
      render();
    } else {
      alert('Precio inválido');
    }
  };

  window.removeFromEditCart = (idx) => {
    if (confirm('¿Eliminar este producto del pedido?')) {
      state.editCart.splice(idx, 1);
      render();
    }
  };

  window.closeEditOrderModal = () => {
    state.showEditOrderModal = false;
    state.editingOrder = null;
    state.editingOrderDetails = [];
    state.editingOrderOldData = null;
    state.editCart = [];
    state.editSelectedClient = null;
    state.editSelectedProduct = null;
    state.editingEditCartIndex = null;
    state.showEditQuantityModal = false;
    render();
  };

  window.abrirEditarPedido = (id) => {
    const order = state.pedidos.find(p => p.id_pedido === id);
    const details = state.detalles_pedido.filter(d => d.id_pedido === id);
    
    if (!order) {
      alert('Pedido no encontrado');
      return;
    }
    
    if (order.estado !== 'Pendiente') {
      alert('Solo se pueden editar pedidos en estado "Pendiente"');
      return;
    }
    
    state.editingOrder = clonarDatos(order);
    state.editingOrderDetails = clonarDatos(details);
    state.editingOrderOldData = clonarDatos(order);
    state.editCart = details.map(d => ({
      product: { 
        código: d.codigo_producto, 
        nombre: d.nombre_producto, 
        precio: d.precio_unitario 
      },
      quantity: d.cantidad,
      unitPrice: d.precio_unitario
    }));
    state.editObservacion = order.observacion || '';
    state.editSelectedClient = { 
      id: order.id_cliente, 
      nombre: order.nombre_cliente 
    };
    state.showEditOrderModal = true;
    render();
  };

    return `

      </div>

    const proximaFactura = state.configNumeracion?.ultimoNumero + 1 || 1001;

        </div>
        <div class="p-4 border-t">

            ${state.loadingButtons.registrarVenta ? '<span class="spinner"></span>Procesando...' : '✓ COMPLETAR VENTA'}
          </button>

    const product = state.selectedProduct;

              <p class="text-xs text-gray-400">${formatFecha(order.fecha)}</p>
            </div>
            <div class="mb-4">
              <p class="text-sm font-bold">Cliente:</p>
              <p class="text-sm">${order.nombre_cliente}</p>
              <p class="text-sm font-bold mt-2">Vendedor:</p>
              <p class="text-sm">${order.nombre_vendedor || 'Sin vendedor'}</p>
            </div>
            <table class="w-full text-sm mb-4">
              <thead class="border-b"><tr><th class="text-left py-2">Producto</th><th class="text-right">Cant</th><th class="text-right">Precio</th><th class="text-right">Subtotal</th></tr></thead>
              <tbody>${detalles.map(d => `<tr class="border-b"><td class="py-2">${d.nombre_producto}</td><td class="text-right">${d.cantidad}</td><td class="text-right">$${Number(d.precio_unitario).toLocaleString()}</td><td class="text-right">$${Number(d.subtotal).toLocaleString()}</td></tr>`).join('')}</tbody>
              <tfoot class="border-t"><tr><td colspan="3" class="pt-2 text-right font-bold">Total:</td><td class="pt-2 text-right font-bold">$${Number(order.total).toLocaleString()}</td></tr>
            </table>
            ${order.observacion ? `<div class="text-sm border-t pt-4 mt-4"><p class="font-bold">Comentarios:</p><p>${order.observacion}</p></div>` : ''}
            <div class="text-center text-xs text-gray-400 border-t pt-4 mt-4">
              <p>¡Gracias por su compra!</p>
            </div>
          </div>
          <div class="p-4 border-t flex gap-2">
            <button onclick="window.print(); closePrintModal();" class="flex-1 bg-teal-600 text-white py-2 rounded-lg">🖨️ Imprimir</button>
            <button onclick="closePrintModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">Cerrar</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderClientHistoryModal() {
    const cliente = state.selectedClientForHistory;
    const pedidosCliente = state.pedidos.filter(p => String(p.id_cliente) === String(cliente?.id));
    return `
      <div class="fixed inset-0 bg-white z-50 flex flex-col">
        <div class="p-4 border-b flex justify-between items-center"><h2 class="font-bold">📜 Historial: ${cliente?.nombre}</h2><button onclick="closeClientHistory()" class="text-2xl">✕</button></div>
        <div class="flex-1 overflow-auto p-4">
          ${Number(cliente?.saldo_por_cobrar) > 0 ? `<div class="bg-orange-50 p-4 rounded-xl mb-4 text-center border"><p class="text-orange-700 font-bold">💰 Saldo pendiente: $${Number(cliente.saldo_por_cobrar).toLocaleString()}</p></div>` : ''}
          ${pedidosCliente.length === 0 ? '<p class="text-gray-400 text-center py-8">Sin compras registradas</p>' : pedidosCliente.map(p => `<div class="bg-gray-50 p-3 rounded-xl mb-2"><div class="flex justify-between"><p class="font-bold">Factura #${p.numero_factura || p.id_pedido}</p><p class="text-sm">${formatFecha(p.fecha)}</p></div><div class="flex justify-between mt-1"><p>Total</p><p class="font-bold">$${Number(p.total).toLocaleString()}</p></div><p class="text-xs text-gray-500">Estado: ${p.estado}</p><p class="text-xs text-gray-500">Vendedor: ${p.nombre_vendedor || 'Sin vendedor'}</p></div>`).join('')}
        </div>
        <div class="p-4 border-t"><button onclick="closeClientHistory()" class="w-full bg-gray-200 py-3 rounded-xl font-bold">Cerrar</button></div>
      </div>
    `;
  }

  function renderNewClientModal() {
    return `
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
          <h3 class="font-bold text-xl mb-4">➕ Nuevo Cliente</h3>
          <input type="text" id="newClientName" placeholder="Nombre completo" class="w-full border border-gray-300 rounded-xl p-3 mb-3" autocomplete="off">
          <input type="tel" id="newClientPhone" placeholder="Teléfono" class="w-full border border-gray-300 rounded-xl p-3 mb-4" autocomplete="off">
          <div class="flex gap-3"><button onclick="saveNewClient()" class="flex-1 bg-teal-600 text-white py-3 rounded-xl font-bold">Guardar</button><button onclick="closeNewClientModal()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">Cancelar</button></div>
        </div>
      </div>
    `;
  }

  // Inicializar
  refreshData();
</script>
</body>
</html>
